<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Jancho</title>
  <style>
    html, body {
      margin: 0; height: 100%;
      background: #0b1220; color: #e2e8f0;
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center; text-align: center;
    }
    .wrap { padding: 24px; max-width: 320px; }
    h1 { font-size: 24px; margin: 16px 0 8px; }
    .accent { color: #2dd4bf; }
    p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
    button {
      margin-top: 20px; background: #0f766e; color: #fff; border: 0;
      padding: 12px 28px; border-radius: 12px; font-weight: 700; font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Jan<span class="accent">cho</span></h1>
    <p>You appear to be offline. Jancho needs an internet connection to load. Please reconnect and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
