<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Jancho clean animated splash screen</title>
  <desc>Clean non-overlapping animated SVG splash screen for Jancho app.</desc>

  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#133A4A"/>
      <stop offset="48%" stop-color="#101A35"/>
      <stop offset="100%" stop-color="#070B1A"/>
    </radialGradient>

    <linearGradient id="neon" x1="150" y1="85" x2="360" y2="370" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6FFFF6"/>
      <stop offset=".55" stop-color="#2DD4C8"/>
      <stop offset="1" stop-color="#00AEB8"/>
    </linearGradient>

    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="3.2" result="b1"/>
      <feGaussianBlur stdDeviation="8" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .screen {
        opacity: 0;
        animation: fadeIn .55s ease-out forwards;
      }

      .ring {
        opacity: 0;
        transform-origin: 256px 235px;
        animation: ringIn .8s ease-out .2s forwards, slowSpin 9s linear 1.1s infinite;
      }

      .line {
        stroke: url(#neon);
        stroke-width: 10;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        filter: url(#glow);
        stroke-dasharray: 700;
        stroke-dashoffset: 700;
        animation: draw 1.25s cubic-bezier(.2,.8,.2,1) forwards;
      }

      .bulb { animation-delay: .25s; }
      .brain { animation-delay: .55s; stroke-width: 8; }
      .base { animation-delay: .9s; stroke-width: 9; }
      .book { animation-delay: 1.05s; stroke-width: 8; }

      .spark {
        fill: url(#neon);
        filter: url(#glow);
        opacity: 0;
        transform-origin: 256px 143px;
        animation: pop .5s cubic-bezier(.2,1.5,.35,1) 1.25s forwards, sparkle 1.9s ease-in-out 1.85s infinite;
      }

      .ray {
        stroke: url(#neon);
        stroke-width: 7;
        stroke-linecap: round;
        filter: url(#glow);
        opacity: 0;
        transform-origin: center;
        animation: popLine .45s cubic-bezier(.2,1.5,.35,1) forwards, rayPulse 2s ease-in-out 1.8s infinite;
      }

      .r1 { animation-delay: 1.2s, 1.8s; }
      .r2 { animation-delay: 1.28s, 1.9s; }
      .r3 { animation-delay: 1.36s, 2s; }

      .word {
        font-family: "Space Grotesk", "Inter", Arial, sans-serif;
        font-size: 58px;
        font-weight: 800;
        letter-spacing: 1px;
        fill: #F8FAFC;
        opacity: 0;
        transform: translateY(12px);
        filter: drop-shadow(0 0 6px rgba(45,212,200,.7));
        animation: wordIn .65s ease-out 1.45s forwards;
      }

      .tag {
        font-family: "Inter", Arial, sans-serif;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 5px;
        fill: #8DFDF7;
        opacity: 0;
        animation: fadeIn .55s ease-out 1.8s forwards;
      }

      @keyframes fadeIn { to { opacity: 1; } }
      @keyframes draw { to { stroke-dashoffset: 0; } }
      @keyframes wordIn { to { opacity: 1; transform: translateY(0); } }

      @keyframes ringIn {
        from { opacity: 0; transform: scale(.75); }
        to { opacity: .55; transform: scale(1); }
      }

      @keyframes slowSpin {
        to { transform: rotate(360deg); }
      }

      @keyframes pop {
        0% { opacity: 0; transform: scale(.25) rotate(-20deg); }
        80% { opacity: 1; transform: scale(1.15) rotate(4deg); }
        100% { opacity: 1; transform: scale(1) rotate(0deg); }
      }

      @keyframes popLine {
        from { opacity: 0; transform: scale(.25); }
        to { opacity: 1; transform: scale(1); }
      }

      @keyframes sparkle {
        0%,100% { transform: scale(1); opacity: .9; }
        50% { transform: scale(1.18); opacity: 1; }
      }

      @keyframes rayPulse {
        0%,100% { opacity: .75; }
        50% { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .screen,.ring,.line,.spark,.ray,.word,.tag {
          animation: none;
          opacity: 1;
          stroke-dashoffset: 0;
          transform: none;
        }
      }
    </style>
  </defs>

  <rect class="screen" x="0" y="0" width="512" height="512" rx="76" fill="url(#bg)"/>

  <!-- background orbit kept behind icon, not overlapping the wordmark -->
  <circle class="ring" cx="256" cy="235" r="138" stroke="#2DD4C8" stroke-width="2" stroke-dasharray="3 15" fill="none"/>

  <!-- top rays placed outside bulb only -->
  <line class="ray r1" x1="256" y1="64" x2="256" y2="82"/>
  <line class="ray r2" x1="177" y1="94" x2="164" y2="80"/>
  <line class="ray r3" x1="335" y1="94" x2="348" y2="80"/>

  <!-- bulb area: 98-280 -->
  <path class="line bulb" d="M198 280C193 243 164 229 164 183C164 132 204 98 256 98C308 98 348 132 348 183C348 229 319 243 314 280"/>

  <!-- simplified brain, separated from bulb outline -->
  <path class="line brain" d="M244 155C224 145 202 157 202 181C184 183 174 196 176 213C178 231 193 239 211 236C216 255 232 263 248 253"/>
  <path class="line brain" d="M268 155C288 145 310 157 310 181C328 183 338 196 336 213C334 231 319 239 301 236C296 255 280 263 264 253"/>
  <path class="line brain" d="M256 151V258"/>
  <path class="line brain" d="M221 195C234 196 242 204 244 216"/>
  <path class="line brain" d="M291 195C278 196 270 204 268 216"/>

  <!-- sparkle inside top of bulb, not touching brain -->
  <path class="spark" d="M256 118L263 136L282 143L263 150L256 168L249 150L230 143L249 136L256 118Z"/>

  <!-- base separated from book -->
  <path class="line base" d="M222 299H290"/>
  <path class="line base" d="M232 319H280"/>

  <!-- book starts lower, no overlap with bulb/base -->
  <path class="line book" d="M158 350C199 346 232 357 256 381C280 357 313 346 354 350"/>
  <path class="line book" d="M150 373C196 368 231 375 256 394C281 375 316 368 362 373"/>

  <!-- wordmark placed lower with clear spacing -->
  <text class="word" x="256" y="448" text-anchor="middle">Jancho</text>
  <text class="tag" x="256" y="477" text-anchor="middle">LEARN • THINK • WIN</text>
</svg>
